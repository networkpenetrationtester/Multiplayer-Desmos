name: desmos_multiplayer

services:
  # api:
  #   image: python:latest
  #   # environment:
  #   volumes:
  #     - python_data:/var/lib/python
  #   ports:
  #     - "8080:8080"
  #   restart: unless-stopped

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: desmos
      POSTGRES_PASSWORD: desmos
      POSTGRES_DB: desmos
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:latest
    # environment:
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "desmos"]
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  python_data:
